<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Game Playground</title>
  <meta name="viewport" content="width=1000">
  <style>
    body { font-family: Arial, sans-serif; background: #23273a; color: #fff; margin: 0; }
    header { background: #ffa726; padding: 25px; text-align: center; font-size: 2em; color: #fff; }
    nav { background: #fff; box-shadow: 0 4px 18px #d8d8f3; padding: 25px 0; }
    .game-link { font-size: 1.2em; color: #ffa726; text-decoration: none; border-bottom: 2px solid #ffa726; padding: 6px 20px; cursor:pointer; }
    .game-link:hover, .game-link.active { color: #ff7043; border-color: #ff7043; }
    #container { max-width: 1100px; margin: 32px auto; background: #23273a; border-radius: 12px; box-shadow: 0 4px 24px #000c; padding: 20px;}
    iframe { width: 1000px; height: 600px; border: 2px solid #ffa726; border-radius: 8px; display:block; margin:auto; background: #000; }
    h2 { color: #ffa726; text-align: center; margin-bottom: 18px;}
    @media (max-width:1100px) { iframe {width:98vw; height:60vw; min-height:400px;} #container{max-width:99vw;} }
  </style>
</head>
<body>
  <header>Proxy Game Playground</header>
  <nav>
    <button class="game-link active" onclick="launch('yohoho')">YoHoHo.io</button>
    <button class="game-link" onclick="launch('minecraft')">Minecraft Classic</button>
    <button class="game-link" onclick="launch('bloxd')">Bloxd.io</button>
    <button class="game-link" onclick="launch('paperio')">Paper.io</button>
    <button class="game-link" onclick="launch('eparkour')">eParkour.io</button>
    <button class="game-link" onclick="launch('papergames')">Papergames.io</button>
  </nav>
  <div id="container">
    <h2 id="game-title">YoHoHo.io - Pirate Battle Royale</h2>
    <iframe 
      id="gameframe" 
      src="https://the-proxy.onrender.com/proxy?url=https%3A%2F%2Fyohoho.io" 
      allow="fullscreen"></iframe>
  </div>
  <script>
    // All URLs must be encoded for query string!
    const proxyBase = "https://the-proxy.onrender.com/proxy?url=";
    const games = {
      yohoho: { url: encodeURIComponent("https://yohoho.io"), title: "YoHoHo.io - Pirate Battle Royale" },
      minecraft: { url: encodeURIComponent("https://classic.minecraft.net"), title: "Minecraft Classic" },
      bloxd: { url: encodeURIComponent("https://bloxd.io"), title: "Bloxd.io - Cube Parkour & Sandbox" },
      paperio: { url: encodeURIComponent("https://paper-io.com"), title: "Paper.io - Territory Strategy Game" },
      eparkour: { url: encodeURIComponent("https://eparkour.io"), title: "eParkour.io - Parkour Challenge" },
      papergames: { url: encodeURIComponent("https://papergames.io/en/"), title: "Papergames.io - Online Board & Puzzle" }
    };
    function launch(game) {
      document.getElementById("game-title").textContent = games[game].title;
      document.getElementById("gameframe").src = proxyBase + games[game].url;
      document.querySelectorAll('.game-link').forEach(b=>b.classList.remove('active'));
      event.target.classList.add('active');
    }
  </script>
</body>
</html>
