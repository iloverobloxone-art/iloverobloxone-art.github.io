<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Proxy Web Gateway</title>
  <style>
    body { font-family: Arial; background:#f7fbfc; }
    .container { max-width:500px; margin:50px auto; background:#fff; padding:2em; border-radius:8px; box-shadow:0 2px 8px #ccd; }
    h2 { color:#3276bd }
    input[type="text"] { width:300px; padding:.5em; }
    button { padding:.6em 1.2em; background:#3276bd; color:#fff; border:none; border-radius:5px; cursor:pointer; }
    button:hover { background:#255781; }
    .info { font-size:.9em; color:#555; margin-top:1.5em;}
  </style>
</head>
<body>
  <div class="container">
    <h2>Browse via Proxy</h2>
    <form onsubmit="proxyRedirect(); return false;">
      <label for="target">Enter Site URL:</label><br>
      <input type="text" id="target" value="https://yohoho.io" required>
      <button type="submit">Go!</button>
    </form>
    <div class="info">
      <p>This lets you browse any site through your proxy at <strong>the-proxy-flax.vercel.app</strong>.</p>
      <ul>
        <li>Example input: <code>https://yohoho.io</code></li>
        <li>Redirects to: <code>https://the-proxy-flax.vercel.app/proxy/&lt;your-site-url&gt;</code></li>
      </ul>
      <p>Some games/sites may block proxy access.</p>
    </div>
  </div>
  <script>
    function proxyRedirect() {
      const site = document.getElementById("target").value.trim();
      if (!/^https?:\/\//i.test(site)) {
        alert("Please enter a URL beginning with http:// or https://");
        return;
      }
      window.location.href = "https://the-proxy-flax.vercel.app/proxy/" + site;
    }
  </script>
</body>
</html>
